<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bus Dispatch — Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f2;
      min-height: 100vh;
      max-width: 500px;
      margin: 0 auto;
      padding: 0 1rem 5rem;
    }

    header {
      position: sticky;
      top: 0;
      background: #f5f5f2;
      padding: 1.2rem 0 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 0.5px solid #e0e0d8;
      margin-bottom: 1.2rem;
      z-index: 10;
    }

    h1 { font-size: 20px; font-weight: 600; color: #111; }
    .subtitle { font-size: 12px; color: #999; margin-top: 2px; }

    .reset-btn {
      font-size: 13px;
      color: #999;
      background: none;
      border: 0.5px solid #ddd;
      border-radius: 8px;
      padding: 7px 14px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .reset-btn:active { background: #e8e8e4; }

    /* Route cards */
    .route-card {
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      border: 0.5px solid #e5e5e0;
      transition: opacity 0.15s;
    }
    .route-card.loading { opacity: 0.45; pointer-events: none; }

    .route-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .route-name { font-size: 17px; font-weight: 600; flex: 1; color: #111; }
    .student-count { font-size: 13px; color: #aaa; }

    /* Status buttons */
    .status-row { display: flex; gap: 8px; }
    .status-btn {
      flex: 1;
      padding: 9px 4px;
      border-radius: 9px;
      border: 1px solid #e5e5e0;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: #f5f5f2;
      color: #bbb;
      transition: transform 0.1s, background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .status-btn:active { transform: scale(0.96); }

    /* Active states */
    .btn-waiting.active  { background: #fffbea; color: #92700a; border-color: #e8c840; }
    .btn-ready.active    { background: #edfaf3; color: #16a34a; border-color: #4ade80; }
    .btn-departed.active { background: #f2f2f2; color: #888;    border-color: #ccc;    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1.8rem;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #111;
      color: #fff;
      padding: 10px 22px;
      border-radius: 24px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Error banner */
    #error-bar {
      display: none;
      background: #fff0f0;
      border: 0.5px solid #ffb3b3;
      color: #cc3333;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 1rem;
      text-align: center;
    }

    #loading-msg {
      text-align: center;
      color: #bbb;
      font-size: 14px;
      padding: 3rem 0;
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>Bus Panel</h1>
      <div class="subtitle">Tap a status to update</div>
    </div>
    <button class="reset-btn" onclick="resetAll()">Reset all</button>
  </header>

  <div id="error-bar">Could not connect — check your network</div>
  <div id="loading-msg">Loading routes...</div>
  <div id="list"></div>
  <div class="toast" id="toast"></div>

  <script>
    // ─── CONFIG — replace with your Supabase project values ─────────────────
    const SUPABASE_URL      = 'https://zbdayfxnnmwsralndfzm.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpiZGF5Znhubm13c3JhbG5kZnptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDk5OTgsImV4cCI6MjA5MTU4NTk5OH0.y3zMnBs3GrDqA901Rj52wd7VgFFsYbyeRNldJYBw08E';
    // ────────────────────────────────────────────────────────────────────────

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let routes = [];

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    function render() {
      document.getElementById('loading-msg').style.display = 'none';
      const list = document.getElementById('list');
      list.innerHTML = routes.map(r => `
        <div class="route-card" id="card-${r.id}">
          <div class="route-top">
            <div class="dot" style="background:${r.color}"></div>
            <div class="route-name">${r.name}</div>
            <div class="student-count">${r.student_count} students</div>
          </div>
          <div class="status-row">
            <button
              class="status-btn btn-waiting ${r.status === 'waiting' ? 'active' : ''}"
              onclick="setStatus(${r.id}, 'waiting')">
              Waiting
            </button>
            <button
              class="status-btn btn-ready ${r.status === 'ready' ? 'active' : ''}"
              onclick="setStatus(${r.id}, 'ready')">
              Board Now
            </button>
            <button
              class="status-btn btn-departed ${r.status === 'departed' ? 'active' : ''}"
              onclick="setStatus(${r.id}, 'departed')">
              Departed
            </button>
          </div>
        </div>
      `).join('');
    }

    async function setStatus(id, status) {
      const card = document.getElementById('card-' + id);
      card.classList.add('loading');

      const { error } = await db
        .from('routes')
        .update({ status, updated_at: new Date().toISOString() })
        .eq('id', id);

      if (!error) {
        const route = routes.find(r => r.id === id);
        routes = routes.map(r => r.id === id ? { ...r, status } : r);
        const labels = { waiting: 'Waiting', ready: 'Board Now', departed: 'Departed' };
        showToast(`${route.name} → ${labels[status]}`);
      } else {
        showToast('Update failed — try again');
      }

      card.classList.remove('loading');
      render();
    }

    async function resetAll() {
      if (!confirm('Reset all routes back to Waiting?')) return;
      const { error } = await db
        .from('routes')
        .update({ status: 'waiting', updated_at: new Date().toISOString() })
        .neq('id', 0);

      if (!error) {
        routes = routes.map(r => ({ ...r, status: 'waiting' }));
        render();
        showToast('All routes reset to Waiting');
      } else {
        showToast('Reset failed — try again');
      }
    }

    async function fetchRoutes() {
      const { data, error } = await db.from('routes').select('*').order('name');
      if (error) {
        document.getElementById('error-bar').style.display = 'block';
        document.getElementById('loading-msg').style.display = 'none';
        return;
      }
      routes = data;
      render();
    }

    // Realtime — keeps panel in sync if multiple staff update simultaneously
    db.channel('panel-channel')
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'routes' }, payload => {
        routes = routes.map(r => r.id === payload.new.id ? payload.new : r);
        render();
      })
      .subscribe();

    fetchRoutes();
  </script>
</body>
</html>
